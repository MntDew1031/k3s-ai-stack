apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "66.x"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 30m
  values:
    # 1. Global nodeSelector for basic components
    nodeSelector:
      kubernetes.io/hostname: think2
    
    # 2. Configure Grafana
    grafana:
      adminPassword: "extremelysecurepassword"
      service:
        type: NodePort
        nodePort: 30090
      nodeSelector:
        kubernetes.io/hostname: think2
    
    # 3. Configure Prometheus Storage (Using Longhorn)
    prometheus:
      prometheusSpec:
        retention: 10d
        retentionSize: "16GB"
        nodeSelector:
          kubernetes.io/hostname: think2
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 20Gi
    kube-state-metrics:
      nodeSelector:
        kubernetes.io/hostname: think2
    
    prometheusOperator:
      nodeSelector:
        kubernetes.io/hostname: think2
    
    alertmanager:
      alertmanagerSpec:
        nodeSelector:
          kubernetes.io/hostname: think2